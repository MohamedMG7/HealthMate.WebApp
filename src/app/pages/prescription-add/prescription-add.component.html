<div class="bg-gray-50 text-gray-800">
  <main class="flex h-screen">
    <div class="flex-1 w-full overflow-y-auto">
      <div class="min-h-screen p-6">
        <div class="w-full">
          <div class="w-full">
            <div class="flex items-center justify-between mb-6">
              <div class="flex items-center gap-2">
                <a routerLink="/healthrecord" class="text-2xl font-bold text-gray-800 flex items-center gap-2">
                  <img src="../../../assets/icons/fluent-mdl2_navigate-back.png" class="w-7 h-7" />
                  Health Record
                </a>
              </div>

                            <select class=" text-sm text-teal-600 rounded-md px-2 py-1 focus:outline-none bg-transparent
                                            focus:ring-2 focus:ring-teal-500">

                <option value="en-us">English (US)</option>
                <option value="ar">Arabic (AR)</option>
                <option value="fr">French (FR)</option>
              </select>
            </div>
          </div>

          <div class="flex flex-wrap gap-y-2 items-center justify-between mb-4">
            <div>
              <label class="text-xl text-teal-600 font-bold mr-3">Patient ID</label>
              <input type="text" [value]="patientNationalId"
                class="border border-gray-300 rounded px-3 py-1 w-60" readonly />
              </div>
              <div>
                <label class="text-xl text-teal-600 font-bold mr-3">Patient Name</label>
                <input type="text" [value]="patientName"
                  class="border border-gray-300 rounded px-3 py-1 w-60" readonly />
                </div>
              </div>

              <!-- Main Content -->
              <div class="rounded-xl border p-4 border-teal-700 font-bold">
                <p class="mb-4">Add Medicine</p>
                <div class="rounded-xl border p-4 border-teal-700 flex items-center gap-3 flex-wrap">
                  <select [(ngModel)]="selectedMedicineId" name="medicineId"
                    class="rounded-md border border-teal-700 px-2 py-1 mr-2 w-[12rem] focus:outline-none focus:ring-2 focus:ring-teal-600">
                    @for (med of medicines; track med) {
                      <option [value]="med.id">{{ med.name }}</option>
                    }
                  </select>
                  <input [(ngModel)]="dosage" name="dosage"
                    class="rounded-md border border-teal-700 px-2 py-1"
                    type="text" placeholder="Dosage">

                    <input [(ngModel)]="frequencyInHours" name="frequencyInHours"
                      class="rounded-md border border-teal-700 px-2 py-1"
                      type="number" placeholder="Frequency">

                      <input [(ngModel)]="durationInDays" name="durationInDays"
                        class="rounded-md border border-teal-700 px-2 py-1"
                        type="number" placeholder="Duration">

                        <button (click)="addMedicineToPrescription()" class="bg-teal-700 text-white w-8 h-8 rounded-full flex items-center justify-center text-sm hover:bg-teal-800">
                          +
                        </button>
                      </div>

                      <p class="mt-4 mb-4">Prescription</p>
                      <div class="rounded-xl border p-4 border-teal-700">
                        <table class="w-full table-auto text-sm text-center">
                          <thead class="bg-teal-800 text-white">
                            <tr>
                              <th class="p-2">Medicine</th>
                              <th class="p-2">Dosage</th>
                              <th class="p-2">Frequency (hrs)</th>
                              <th class="p-2">Duration (days)</th>
                            </tr>
                          </thead>
                          <tbody class="text-gray-700">
                            @for (med of prescriptionMedicines; track med) {
                              <tr class="border-b border-teal-600">
                                <td class="p-2">{{ getMedicineNameById(med.medicineId) }}</td>
                                <td class="p-2">{{ med.dosage }}</td>
                                <td class="p-2">{{ med.frequencyInHours }}</td>
                                <td class="p-2">{{ med.durationInDays }}</td>
                              </tr>
                            }
                          </tbody>
                        </table>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </main>
          </div>

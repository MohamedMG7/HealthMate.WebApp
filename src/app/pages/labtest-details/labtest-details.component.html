<!-- labtest-details.component.html -->
<div class="p-6">
  <div class="flex items-center justify-between mb-6">
    <button class="flex items-center text-2xl font-bold text-gray-800 gap-2"
      routerLink="/healthrecord">
      <img src="../assets/icons/fluent-mdl2_navigate-back.png" class="w-7 h-7" />
      Lab Test
    </button>

    <select class="text-sm text-teal-600 rounded-md px-2 py-1 bg-transparent focus:ring-2 focus:ring-teal-500">
      <option value="en-us">English (US)</option>
      <option value="ar">Arabic (AR)</option>
      <option value="fr">French (FR)</option>
    </select>
  </div>

  <div class="flex flex-wrap justify-between mb-4">
    <div>
      <label class="text-xl text-teal-600 font-bold mr-3">Patient ID</label>
      <input type="text" [value]="patientId" class="border rounded px-3 py-1 w-60" readonly />
    </div>
    <div>
      <label class="text-xl text-teal-600 font-bold mr-3">Patient Name</label>
      <input type="text" [value]="patientName" class="border rounded px-3 py-1 w-60" readonly />
    </div>
  </div>

  <div>
    <label class="text-2xl font-bold mr-3">Test Name</label>
    <input type="text" [value]="labTestName" class="border rounded px-3 py-1 w-60" readonly />
  </div>

  <div class="border border-teal-700 rounded-2xl p-5 mt-10">
    <table class="w-full table-auto border rounded">
      <thead class="bg-teal-800 text-white">
        <tr>
          <th class="p-2">Test</th>
          <th class="p-2">Result</th>
          <th class="p-2">Normal-Range</th>
        </tr>
      </thead>
      <tbody class="text-sm text-gray-700 text-center">
        @if (loadingError) {
          <tr>
            <td colspan="3" class="py-4 text-red-500">{{ loadingError }}</td>
          </tr>
        }
        @if (!loadingError && labTestResults.length === 0) {
          <tr>
            <td colspan="3" class="py-4">No test results available</td>
          </tr>
        }
        @for (result of labTestResults; track result) {
          <tr class="border-b border-teal-700">
            <td class="py-4">{{ result.attributeName || 'N/A' }}</td>
            <td class="p-2">{{ result.value || 'N/A' }}</td>
            <td class="p-2">Normal range not provided</td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>

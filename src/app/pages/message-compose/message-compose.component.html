<div class="bg-gray-50 text-gray-800">
  <main class="flex h-screen">
    <div class="flex-1 w-full overflow-y-auto">
      <div class="min-h-screen p-6">
        <div class="w-full">
          <!-- Navigation and Language Switcher -->
          <div class="flex items-center justify-between mb-6">
            <div class="flex items-center gap-2">
              <a routerLink="/messages" class="text-2xl font-bold text-gray-800 flex items-center gap-2">
                <img src="../../../assets/icons/fluent-mdl2_navigate-back.png" class="w-7 h-7" />
                Inbox
              </a>
            </div>

            <select
              class="text-sm text-teal-600 rounded-md px-2 py-1 focus:outline-none bg-transparent focus:ring-2 focus:ring-teal-500"
              >
              <option value="en-us">English (US)</option>
              <option value="ar">Arabic (AR)</option>
              <option value="fr">French (FR)</option>
            </select>
          </div>

          <!-- Message Compose Box -->
          <div class="rounded-xl border p-6 border-teal-700 font-bold max-w-3xl mx-auto bg-white">
            <h2 class="text-xl font-semibold text-teal-700 mb-6">✉️ Compose Message</h2>

            <form class="space-y-6" (ngSubmit)="sendMessage()" #messageForm="ngForm">
              <!-- To -->
              <div class="flex items-center">
                <label for="receiver" class="w-32 text-sm font-medium">To</label>
                <select
                  id="receiver"
                  [(ngModel)]="selectedReceiverId"
                  name="receiver"
                  required
                  class="flex-1 border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-teal-600"
                  >
                  @for (receiver of receivers; track receiver) {
                    <option [value]="receiver.id">
                      {{ receiver.name }} ({{ receiver.nationlId }})
                    </option>
                  }
                </select>
              </div>

              <!-- Subject -->
              <div class="flex items-center">
                <label for="subject" class="w-32 text-sm font-medium">Subject</label>
                <input
                  id="subject"
                  type="text"
                  [(ngModel)]="subject"
                  name="subject"
                  required
                  class="flex-1 border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-teal-600"
                  placeholder="Subject"
                  />
                </div>

                <!-- Body -->
                <div class="flex items-start">
                  <label for="body" class="w-32 text-sm font-medium mt-2">Body</label>
                  <textarea
                    id="body"
                    [(ngModel)]="body"
                    name="body"
                    rows="6"
                    required
                    class="flex-1 border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-teal-600"
                    placeholder="Write your message here..."
                  ></textarea>
                </div>

                <!-- Send Button -->
                <div class="text-center">
                  <button
                    type="submit"
                    class="bg-teal-700 text-white px-6 py-2 rounded hover:bg-teal-800 transition w-[17rem] font-bold"
                    >
                    Send
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

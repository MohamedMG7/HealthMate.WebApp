<div class="flex h-screen bg-white">
    <!-- Sidebar -->
    <div class="w-64 bg-teal-800 text-white flex flex-col justify-between">
      <div>
        <div class="flex items-center justify-center h-20 border-b border-teal-700 select-none cursor-default">
          <img src="assets/images/logo.png" alt="Logo" class="h-10 mr-3 object-contain" />
          <span class="text-xl font-bold select-none cursor-default">Health Mate</span>
        </div>
  
        <nav class="mt-4 space-y-2 px-4">
          <a routerLink="/dashboard" routerLinkActive="bg-teal-700"
             class="flex items-center p-2 rounded hover:bg-teal-700 font-semibold select-none cursor-default">
                <img src="assets/icons/dashboard.png" class="mr-2 w-5 h-5" />
                Dashboard
            </a>
            <a routerLink="/encounter" routerLinkActive="bg-teal-700"
                class="flex items-center p-2 rounded hover:bg-teal-700 font-semibold select-none cursor-default">
                <img src="assets/icons/patient 1.png" class="mr-2 w-5 h-5" />
                Encounter
            </a>
            <a routerLink="/messages" routerLinkActive="bg-teal-700" class="flex items-center p-2 rounded hover:bg-teal-700 font-semibold select-none cursor-default">
                <img src="../assets/icons/message.png" class="mr-2 w-5 h-5" alt="Messages Icon" />
                Messages
            </a>
            <a routerLink="/reports" routerLinkActive="bg-teal-700" class="flex items-center p-2 rounded hover:bg-teal-700 font-semibold select-none cursor-default">
                <img src="../assets/icons/mdi_report-line.png" class="mr-2 w-5 h-5" alt="Report Icon" />
                Report
            </a>
            <a routerLink="/settings" routerLinkActive="bg-teal-700" class="flex items-center p-2 rounded hover:bg-teal-700 font-semibold select-none cursor-default">
                <img src="../assets/icons/setting.png" class="mr-2 w-5 h-5" alt="Settings Icon" />
                Settings
            </a>
            <a routerLink="/policy" routerLinkActive="bg-teal-700" class="flex items-center p-2 rounded hover:bg-teal-700 font-semibold select-none cursor-default">
                <img src="../assets/icons/security.png" class="mr-2 w-5 h-5" alt="Privacy Icon" />
                Policy Privacy
            </a>
            <a routerLink="/early-detection" routerLinkActive="bg-teal-700" class="flex items-center p-2 rounded hover:bg-teal-700 font-semibold cursor-pointer">
                <svg class="mr-2 w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" />
                </svg>
                Early Detection
            </a>
        </nav>
      </div>
  
      <div class="py-4 px-2 border-t border-teal-700">
        <div class="flex items-center justify-between gap-2 select-none cursor-default">
          <div class="rounded-full flex items-center justify-center bg-gray-400 w-10 h-10">
            <img src="assets/images/tabler_user-filled.png" class="w-5 h-5" />
          </div>
          <div class="flex flex-col select-none cursor-default">
            <p class="font-semibold text-sm">D. {{ username }}</p>
            <p class="text-sm text-white">{{ email }}</p>
          </div>
          <div class="cursor-pointer select-none cursor-default" (click)="logout()">
            <img src="assets/icons/logout.png" />
          </div>
        </div>
      </div>
    </div>
  
    <!-- Main Content -->
    <div class="flex-1 flex flex-col overflow-hidden">
      <router-outlet></router-outlet>
    </div>
  </div>

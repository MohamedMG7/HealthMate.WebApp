<div class="bg-gray-50 text-gray-800">
  <main class="flex h-screen">
    <div class="flex-1 w-full overflow-y-auto">
      <div class="min-h-screen p-6">
        <div class="w-full">
          <!-- Language and Back Navigation-->
          <div class="w-full">
            <div class="flex items-center justify-between mb-6">
              <div class="flex items-center gap-2">
                <a routerLink="/healthrecord" class="text-2xl font-bold text-gray-800 flex items-center gap-2">
                  <img src="../../../assets/icons/fluent-mdl2_navigate-back.png" class="w-7 h-7" />
                  Health Record
                </a>
              </div>

              <select class=" text-sm text-teal-600 rounded-md px-2 py-1 focus:outline-none bg-transparent
                              focus:ring-2 focus:ring-teal-500">

                <option value="en-us">English (US)</option>
                <option value="ar">Arabic (AR)</option>
                <option value="fr">French (FR)</option>
              </select>
            </div>
          </div>

          <!--patient Information-->
          <div class="flex flex-wrap gap-y-2 items-center justify-between mb-4">
            <div>
              <label class="text-xl text-teal-600 font-bold mr-3">Patient ID</label>
              <input type="text" [value]="patientId"
                class="border border-gray-300 rounded px-3 py-1 w-60" readonly />
              </div>
              <div>
                <label class="text-xl text-teal-600 font-bold mr-3">Patient Name</label>
                <input type="text" [value]="patientName"
                  class="border border-gray-300 rounded px-3 py-1 w-60" readonly />
                </div>
              </div>

              <!-- Main Content-->
              <div class="rounded-xl border p-4 border-teal-700 font-bold">
                <form class="space-y-4" (ngSubmit)="submitCondition()" #conditionForm="ngForm">
                  <div class="flex items-center">
                    <label for="conditionName" class="w-32 text-sm font-medium">Condition name</label>
                    <input id="conditionName" type="text" list="diseases" [(ngModel)]="conditionName" name="conditionName"
                      required class="flex-1 border rounded px-3 py-1.5 focus:outline-none focus:ring-2 focus:ring-teal-600"/>
                      <datalist id="diseases">
                        @for (disease of filteredDiseases; track disease) {
                          <option [value]="disease.name"></option>
                        }
                      </datalist>
                    </div>

                    <div class="flex items-center">
                      <label for="bodySite" class="w-32 text-sm font-medium">Body site</label>
                      <select id="bodySite"
                        [(ngModel)]="selectedBodySiteId"
                        name="bodySite"
                        class="flex-1 border rounded px-3 py-1.5 focus:outline-none focus:ring-2 focus:ring-teal-600">
                        <option [ngValue]="null">N/A</option>
                        @for (site of bodySites; track site) {
                          <option [ngValue]="site.bodySiteId">
                            {{ site.bodySiteName }}
                          </option>
                        }
                      </select>
                    </div>

                    <div class="flex items-center">
                      <label for="severity" class="w-32 text-sm font-bold">Severity</label>
                      <select id="severity" [(ngModel)]="severity" name="severity"
                        class="flex-1 border-2 border-black rounded px-3 py-1.5 focus:outline-none focus:ring-teal-600" required>
                        <option [ngValue]="0">Mild</option>
                        <option [ngValue]="1">Moderate</option>
                        <option [ngValue]="2">Severe</option>
                      </select>
                    </div>

                    <div class="flex items-start">
                      <label for="note" class="w-32 text-sm font-medium mt-2">Note</label>
                      <textarea id="note" [(ngModel)]="note" name="note" rows="3"
                      class="flex-1 border rounded px-3 py-1.5 focus:outline-none focus:ring-2 focus:ring-teal-600"></textarea>
                    </div>

                    <div class="text-center">
                      <button type="submit" class="bg-teal-700 text-white px-6 py-2 rounded hover:bg-teal-800 transition w-[17rem] font-bold">
                        Add
                      </button>
                    </div>
                  </form>
                </div>
              </div>
            </div>
          </div>
        </main>
      </div>

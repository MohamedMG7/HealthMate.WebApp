<div class="h-screen w-full bg-gray-50 p-6 overflow-y-auto">
  <div class="border border-teal-700 rounded-xl font-bold p-6">
    <h1 class="text-2xl text-teal-700 font-extrabold mb-6 text-center">⚙️ Settings</h1>

    <div class="flex flex-wrap justify-between gap-6 mb-10">
      <!-- Personal Info -->
      <div class="w-full md:w-[45%] rounded-lg border border-teal-700 p-4">
        <h2 class="text-teal-700 mb-4 font-semibold">Personal Information</h2>

        <!-- Name -->
        <div class="relative w-[90%] mb-4">
          <span class="absolute inset-y-0 left-0 top-7 pl-3 flex items-center">
            <img src="../../../assets/icons/icon-park-outline_edit-name.png" />
          </span>
          <label class="mb-3 font-semibold">Name</label>
          <input
            type="text"
            [(ngModel)]="name"
            readonly
            class="pl-10 w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500"
          />
        </div>

        <!-- Email -->
        <div class="relative w-[90%] mb-4">
          <span class="absolute inset-y-0 left-0 top-7 pl-3 flex items-center">
            <img src="../../../assets/icons/mdi-light_email.png" />
          </span>
          <label class="mb-3 font-semibold">Email</label>
          <input
            type="text"
            [(ngModel)]="email"
            readonly
            class="pl-10 w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500"
          />
        </div>

        <!-- Specialization -->
        <div class="relative w-[90%] mb-4">
          <span class="absolute inset-y-0 left-0 top-7 pl-3 flex items-center">
            <img src="../../../assets/icons/material-symbols-light_stethoscope-outline.png" />
          </span>
          <label class="mb-3 font-semibold">Specialization</label>
          <input
            type="text"
            [(ngModel)]="specialization"
            readonly
            class="pl-10 w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500"
          />
        </div>

        <div class="flex gap-2 text-sm mt-10">
          <img src="../../../assets/icons/exclamationmark-circle-fill.png" class="w-7 h-7" />
          <p>
            This information is fixed and cannot be changed. Please contact us via email to request changes.
          </p>
        </div>
      </div>

      <!-- Account Settings -->
      <div class="w-full md:w-[45%] rounded-lg border border-teal-700 p-4">
        <h2 class="text-teal-700 mb-4 font-semibold">Account Settings</h2>

        <!-- Old Password -->
        <div class="relative w-[90%] mb-4">
          <span class="absolute inset-y-0 left-0 top-7 pl-3 flex items-center">
            <img src="../../../assets/icons/tabler_edit.png" />
          </span>
          <label class="mb-3 font-semibold">Old Password</label>
          <input
            type="password"
            [(ngModel)]="oldPassword"
            placeholder="old password"
            class="pl-10 w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500"
          />
        </div>

        <!-- New Password -->
        <div class="relative w-[90%] mb-4">
          <span class="absolute inset-y-0 left-0 top-7 pl-3 flex items-center">
            <img src="../../../assets/icons/tabler_edit.png" />
          </span>
          <label class="mb-3 font-semibold">New Password</label>
          <input
            type="password"
            [(ngModel)]="newPassword"
            placeholder="new password"
            class="pl-10 w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500"
          />
        </div>

        <!-- Confirm Password -->
        <div class="relative w-[90%] mb-4">
          <span class="absolute inset-y-0 left-0 top-7 pl-3 flex items-center">
            <img src="../../../assets/icons/tabler_edit.png" />
          </span>
          <label class="mb-3 font-semibold">Confirm Password</label>
          <input
            type="password"
            [(ngModel)]="confirmPassword"
            placeholder="confirm password"
            class="pl-10 w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500"
          />
        </div>

        <div class="flex justify-center mt-5">
          <button
            (click)="resetPassword()"
            class="bg-teal-700 hover:bg-teal-800 transition-colors duration-200 text-white rounded-xl py-3 px-8 font-bold w-[17rem]"
          >
            Save
          </button>
        </div>
      </div>
    </div>

    <!-- Delete Account -->
    <div class="w-full rounded-lg border border-teal-700 p-4">
      <h2 class="text-teal-700 mb-4 font-semibold">Delete Account</h2>
      <div class="flex gap-2 text-sm mt-5 items-center">
        <img src="../../../assets/icons/exclamationmark-circle-fill.png" class="w-7 h-7" />
        <p>By deleting your account, you will lose all your data.</p>
      </div>

      <div class="flex justify-end mt-5">
        <button
          class="bg-red-600 hover:bg-red-700 transition-colors duration-200 text-white font-bold rounded-xl py-3 px-10 w-[17rem] mr-[8rem]"
        >
          Delete
        </button>
      </div>
    </div>
  </div>
</div>

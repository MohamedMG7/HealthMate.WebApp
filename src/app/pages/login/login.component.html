<div class="min-h-screen flex items-center justify-center bg-white">
  <div class="flex w-full h-screen">
    <!-- Left: Form -->
    <div class="w-full md:w-1/3 flex flex-col py-10 px-8 md:px-15">
      <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="flex items-center mb-[5rem] h-20 select-none cursor-default">
          <img src="assets/images/logo.png" alt="Logo" class="h-10 mr-3 object-contain" />
          <span class="text-xl font-bold text-teal-800">Health Mate</span>
        </div>

        <h2 class="font-semibold w-[80%] text-2xl mb-[5rem]">
          Welcome to Health Mate<br />
          Sign into your account
        </h2>

        <!-- Form -->
        <form class="space-y-5" (ngSubmit)="onSubmit($event)">
          <div>
            <label class="block text-sm mb-1 text-gray-700">Email Address</label>
            <input
              type="email"
              placeholder="Enter your email"
              name="email"
              [(ngModel)]="email"
              required
              class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-teal-600" />
            </div>

            <div>
              <label class="block text-sm mb-1 text-gray-700">Password</label>
              <div class="relative">
                <input
                  [type]="showPassword ? 'text' : 'password'"
                  placeholder="Enter your password"
                  name="password"
                  [(ngModel)]="password"
                  required
                  class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-teal-600" />
                  <button
                    type="button"
                    (click)="togglePasswordVisibility()"
                    class="absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-600">
                    <i [class]="showPassword ? 'fa fa-eye w-5 h-5' : 'fa fa-eye-slash w-5 h-5'"></i>
                  </button>
                </div>
              </div>

              <!-- Error Message -->
              @if (loginError) {
                <div class="text-red-600 text-sm text-center font-semibold">
                  {{ loginError }}
                </div>
              }

              <button
                type="submit"
                class="w-full cursor-pointer bg-teal-700 text-white py-2 rounded-md hover:bg-teal-800 transition duration-200">
                Login
              </button>
            </form>
          </div>
        </div>

        <!-- Right: Image -->
        <div class="hidden md:block w-2/3">
          <img src="assets/images/auth.png" alt="Medical Illustration" class="w-full h-full object-cover" />
        </div>
      </div>
    </div>

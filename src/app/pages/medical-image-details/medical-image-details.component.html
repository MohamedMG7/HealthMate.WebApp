<!-- medical-image-details.component.html -->
<div class="p-6 min-h-screen bg-[#e9e9e9]">
  <div class="flex items-center justify-between mb-6">
    <button class="flex items-center text-2xl font-bold text-gray-800 gap-2" routerLink="/healthrecord">
      <img src="../assets/icons/fluent-mdl2_navigate-back.png" class="w-7 h-7" />
      Imaging
    </button>

    <select class="text-sm text-teal-600 rounded-md px-2 py-1 bg-transparent focus:ring-2 focus:ring-teal-500">
      <option value="en-us">English (US)</option>
      <option value="ar">Arabic (AR)</option>
      <option value="fr">French (FR)</option>
    </select>
  </div>

  <div class="flex flex-wrap justify-between mb-4 gap-4">
    <div>
      <label class="text-xl text-teal-600 font-bold mr-3">Patient ID</label>
      <input type="text" [value]="patientId" class="border rounded px-3 py-1 w-60" readonly />
    </div>
    <div>
      <label class="text-xl text-teal-600 font-bold mr-3">Patient Name</label>
      <input type="text" [value]="patientName" class="border rounded px-3 py-1 w-60" readonly />
    </div>
  </div>

  @if (loadingError) {
    <div class="w-full text-center text-red-500 p-4 bg-red-50 rounded-lg mb-4">
      {{ loadingError }}
    </div>
  }

  <div class="w-full border border-teal-700 rounded-lg p-2 mt-10">
    <div class="flex items-center justify-center gap-4 mb-5">
      <h2 class="font-semibold text-2xl my-5">{{ imageTitle }}</h2>
    </div>

    <div class="flex gap-4 mb-4">
      <textarea
        [value]="interpretation"
        placeholder="Report/Interpretation"
        class="h-[30rem] border w-[60%] border-gray-500 rounded-lg p-3 resize-none focus:outline-none focus:ring-2 focus:ring-teal-600"
        readonly>
      </textarea>

      <div class="image-container w-[40%] h-[30rem] flex items-center justify-center relative rounded-lg">
        <!-- Simple image element - just like the old website -->
        @if (hasImage) {
          <img id="medical-image" class="h-full w-full object-contain" alt="Medical Image" />
        }

        <!-- No image placeholder -->
        @if (!hasImage) {
          <div class="text-center text-gray-500">
            <img src="../assets/images/no-image-placeholder.png" class="h-full w-full object-contain" alt="No Image" />
            <div class="absolute inset-0 flex items-center justify-center">
              <span>No image available</span>
            </div>
          </div>
        }
      </div>
    </div>
  </div>
</div>

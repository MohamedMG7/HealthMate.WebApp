<div class="w-full h-screen flex flex-col items-center justify-start bg-white p-6 overflow-hidden">
  <h1 class="text-2xl font-semibold mb-4 text-center">{{ documentName }}</h1>

  @if (errorMessage) {
    <div class="text-red-500">{{ errorMessage }}</div>
  }

  <div
    class="relative flex-1 w-full overflow-hidden bg-white cursor-grab"
    (wheel)="onWheel($event)"
    (mousedown)="onMouseDown($event)"
    (mousemove)="onMouseMove($event)"
    (mouseup)="onMouseUp()"
    (mouseleave)="onMouseUp()"
    >
    @if (documentUrl) {
      <img
        [src]="documentUrl"
        alt="Zoomable Document"
        [style.transform]="transform"
        [style.transition]="transitionStyle"
        class="absolute top-0 left-0 select-none"
        draggable="false"
        />
    }
  </div>
</div>

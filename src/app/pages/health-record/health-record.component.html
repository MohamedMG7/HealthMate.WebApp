<div class="min-h-screen p-6">
  <div class="w-full">
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
      <div class="flex items-center gap-2">
        <button (click)="navigateBack()" class="text-2xl font-bold text-gray-800 flex items-center gap-2">
          <img src="assets/icons/fluent-mdl2_navigate-back.png" class="w-7 h-7" />
          Health Record
        </button>
      </div>
      <select class="text-sm text-teal-600 rounded-md px-2 py-1 bg-transparent focus:ring-2 focus:ring-teal-500">
        <option value="en-us">English (US)</option>
        <option value="ar">Arabic (AR)</option>
        <option value="fr">French (FR)</option>
      </select>
    </div>

    <!-- Patient Info -->
    <div class="flex flex-wrap gap-y-2 items-center justify-between mb-4">
      <div>
        <label class="text-xl text-teal-600 mr-9">Patient ID</label>
        <input type="text" [value]="patientNationalId" readonly class="border border-gray-300 rounded px-3 py-1 w-60" />
      </div>
      <div>
        <label class="text-xl text-teal-600 mr-9">Patient Name</label>
        <input type="text" [value]="patientName" readonly class="border border-gray-300 rounded px-3 py-1 w-50 ml-5" />
      </div>
    </div>

    <!-- Tabs -->
    <div class="rounded-xl border p-4 border-teal-700">
      <div class="flex flex-wrap gap-y-2 justify-around mb-4">
        @for (tab of tabs; track tab) {
          <button
            class="tab-button px-4 py-2 border rounded-xl"
                  [ngClass]="{
                    'bg-teal-700 text-white': activeTab === tab.id,
                    'bg-white text-black': activeTab !== tab.id
                  }"
            (click)="selectTab(tab.id)">
            {{ tab.label }}
          </button>
        }
      </div>

      <!-- Tab Content -->
      <div>
        @switch (activeTab) {
          @case ('lab') {
            <app-lab-tab [labTests]="data?.labTestsSummary"></app-lab-tab>
          }
          @case ('imaging') {
            <app-imaging-tab [images]="data?.medicalImagesSummary"></app-imaging-tab>
          }
          @case ('medicine') {
            <app-medicine-tab [medicines]="data?.medicinesSummary"></app-medicine-tab>
          }
          @case ('condition') {
            <app-condition-tab [conditions]="data?.conditionsSummary"></app-condition-tab>
          }
          @case ('prescription') {
            <app-prescription-tab [prescriptions]="data?.prescriptionsSummary"></app-prescription-tab>
          }
        }
      </div>
    </div>

  </div>
</div>

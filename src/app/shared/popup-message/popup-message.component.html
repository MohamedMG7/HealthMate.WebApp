<div
  [ngClass]="{
    'bg-green-100 border-green-500 text-green-700': type === 'success',
    'bg-red-100 border-red-500 text-red-700': type === 'error',
    'bg-blue-100 border-blue-500 text-blue-700': type === 'info'
  }"
  class="border px-6 py-4 rounded-xl fixed top-6 right-6 shadow-2xl z-50 flex items-center gap-4 transform transition-all duration-500 animate-slide-in"
  id="{{ message }}"
  >
  @if (imageUrl) {
    <img [src]="imageUrl" class="w-8 h-8" />
  }
  <p class="text-lg font-bold">{{ message }}</p>
</div>
